<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern CODAP 2x2 Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>CODAP Connection Test (Modern API)</h2>
    <p>Click below to create the table and add zeros.</p>
    
    <button id="insertBtn">Insert 2x2 Data</button>
    <div id="status"></div>

    <script type="module">
        // Import the modern library directly from NPM via a module CDN
        import codapInterface from 'https://esm.sh/codap-plugin-api';

        const statusDiv = document.getElementById('status');

        // 1. Initialize the connection using the imported module
        codapInterface.init({
            name: 'SimpleTestPlugin',
            title: 'Simple 2x2 Test',
            version: '1.2',
            dimensions: { width: 300, height: 250 }
        }).catch((error) => {
            console.error("Init failed:", error);
            statusDiv.innerText = "Initialization failed. Check console.";
            statusDiv.style.color = "red";
        });

        // 2. Build the table AND insert data when clicked
        document.getElementById('insertBtn').addEventListener('click', async () => {
            statusDiv.innerText = "Working...";
            statusDiv.style.color = "black";

            try {
                // Step A: Create the Table structure
                await codapInterface.sendRequest({
                    action: 'create',
                    resource: 'dataContext',
                    values: {
                        name: 'Test_Dataset',
                        title: '2x2 Zeros Table',
                        collections: [{
                            name: 'Test_Data',
                            attrs: [
                                { name: 'Column_A', type: 'numeric' },
                                { name: 'Column_B', type: 'numeric' }
                            ]
                        }]
                    }
                });

                // Step B: Insert the items (the zeros)
                await codapInterface.sendRequest({
                    action: 'create',
                    resource: 'dataContext[Test_Dataset].item',
                    values: [
                        { Column_A: 0, Column_B: 0 },
                        { Column_A: 0, Column_B: 0 }
                    ]
                });

                statusDiv.innerText = "Success! Data inserted.";
                statusDiv.style.color = "green";

            } catch (error) {
                console.error("Data insertion failed:", error);
                statusDiv.innerText = "Failed! See browser console.";
                statusDiv.style.color = "red";
            }
        });
    </script>
</body>
</html>
